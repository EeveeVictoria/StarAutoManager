# StarAutoManager Configuration
# ⚠️ Sensitive values MUST be set via GitHub Secrets — NEVER put them here:
#   - GITHUB_TOKEN: GitHub Personal Access Token
#   - LLM_BASE_URL: LLM API endpoint (e.g. https://api.openai.com/v1)
#   - LLM_API_KEY:  LLM API key

github:
  # GitHub username (leave empty to auto-detect from GITHUB_TOKEN)
  username: ""
  # token is injected via GITHUB_TOKEN env var — do NOT put it here

llm:
  model: "gemini-2.5-flash-lite" # Since you use Gemini, this is a great, fast choice
  temperature: 0.3              # Keep this low for "robotic" consistency
  batch_size: 20                
  language: "en"

categorization:
  max_new_lists: 5        
  min_confidence: "medium" 
  fetch_readme: true      # Highly recommended for accuracy
  dry_run: true           # Set to TRUE for your first run! 
  max_repos_per_run: 50   # Start small to make sure you like the categories

notifications:
  issue: true               # Create GitHub Issue report
  issue_label: "star-manager"  # Issue label name
  summary_in_readme: true   # Generate STARS.md summary file

advanced:
  cache_file: ".star-cache.json"  # Cache file path (avoids re-categorizing)
  rate_limit_buffer: 500          # GraphQL API rate limit headroom
  concurrent_llm_calls: 3         # Concurrent LLM requests
  retry_attempts: 3               # API retry count
  retry_delay: 5                  # Retry interval (seconds)
